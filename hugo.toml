# timeout
timeout = "1200s"
# your website url
baseURL = 'https://erikaaaaaaaaaaaa.github.io'
# website title
title = 'EAT'
assetDir = "assets"
publishDir = "public"
# don't touch this
disableKinds = ["taxonomy", "term", "home"]
# robots.txt
enableRobotsTXT = true

# theme as module
[module]
# replacements = "github.com/Sped0n/bridget/v2 -> ../.." # deploy with local dir (relative to hugo site theme dir)  WARN: delete this line if you want to deploy with git
# [[module.imports]]
# path = "github.com/Sped0n/bridget/v2" # deploy with git (recommended)

[[module.mounts]]
source = 'assets'
target = 'assets'

[[module.mounts]]
source = 'static'
target = 'static'

[[module.mounts]]
source = 'content'
target = 'content'

# This is the trick: telling Hugo 'bundled' is part of 'static'
[[module.mounts]]
source = 'bundled'
target = 'assets/bundled'
